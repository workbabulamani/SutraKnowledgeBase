services:
  grnthvault:
    build: .
    container_name: grnthvault
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${PORT:-3001}/api/config" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
